name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — type-check + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # Dummy values so the Prisma client instantiates; the unit/HTTP tests
      # never open a DB connection (guards/validation short-circuit first).
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DIRECT_DATABASE_URL: postgresql://user:pass@localhost:5432/db
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm test

  typecheck:
    name: Type-check (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [backoffice, mobile]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
